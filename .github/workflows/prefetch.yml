name: ดึงข้อมูลหุ้นล่วงหน้า (วันละครั้ง หลังตลาดปิด)

on:
  # v3.4: เปลี่ยนจากทุก 4 ชม. (6 รอบ/วัน) เป็นวันละครั้ง — ตลาดสหรัฐฯและไทยปิด
  # คนละเวลากันมาก (สหรัฐฯปิด ~04:00 น.ไทย, ไทยปิด ~16:30 น.ไทย) เวลาที่ดี
  # ที่สุดคือรันรอบเดียวตอนเช้ามืดไทย เพราะตอนนั้นทั้งสองตลาด "ปิดไปแล้ว"
  # ทั้งคู่ (ไทยปิดมาตั้งแต่บ่ายเมื่อวาน, สหรัฐฯปิดไปเมื่อคืนนี้)
  # UTC 22:00 = ไทย 05:00 (เผื่อ buffer ให้ Yahoo อัปเดตข้อมูลปิดตลาดสหรัฐฯเสร็จ
  # ก่อน เพราะตลาดสหรัฐฯปิดจริงราว 03:00-04:00 น.ไทย ขึ้นกับ DST)
  schedule:
    - cron: "0 22 * * *"
  # กดรันมือได้จากแท็บ Actions บน GitHub เวลาอยากดึงสดนอกรอบ
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: รัน fetch_data.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_data.py

      - name: Commit และ push ข้อมูลใหม่
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_scan.json data/alerts.json
          git diff --quiet --cached || git commit -m "Auto-update prefetched stock data [skip ci]"
          git push
